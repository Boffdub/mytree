<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Opening MyTree…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f9f0;
      color: #1e8f2d;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p  { font-size: 16px; color: #555; margin-bottom: 24px; }
    a  {
      display: inline-block;
      background: #1e8f2d;
      color: white;
      padding: 14px 32px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>🌲 Opening MyTree…</h1>
  <p>You should be redirected to the app automatically.</p>
  <a id="open-link" href="#">Open MyTree</a>

  <script>
    // Forward the hash fragment (tokens) from this URL to the app's custom scheme
    var hash = window.location.hash || window.location.search;
    var appUrl = 'mytree://auth-callback' + hash;

    // Update the fallback button
    document.getElementById('open-link').href = appUrl;

    // Attempt auto-redirect
    window.location.href = appUrl;
  </script>
</body>
</html>
